name: File 1 -  Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure Server Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="Allow-Minecraft" 2>$null
          netsh advfirewall firewall add rule name="Allow-Minecraft" dir=in action=allow protocol=TCP localport=25565
          Restart-Service -Name TermService -Force

      - name: Create Operator User
        run: |
          $securePassword = "${{ secrets.MINECRAFT_PASSWORD }}" | ConvertTo-SecureString -AsPlainText -Force
          New-LocalUser -Name "minecraft-op" -Password $securePassword -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "minecraft-op"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "minecraft-op"
          
          if (-not (Get-LocalUser -Name "minecraft-op")) { exit 1 }
          echo "OPERATOR_CREDENTIALS=Username: minecraft-op | Pass: [configured in secrets]" >> $env:GITHUB_ENV
