name: File 3 - Network Connection

on:
  workflow_dispatch:

jobs:
  network:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install  Bridge
        run: |
          $bridgeUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\minecraft-bridge.msi"
          Invoke-WebRequest -Uri $bridgeUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Connect to  Network
        run: |
          $bridgePath = "$env:ProgramFiles\Tailscale\tailscale.exe"
          & $bridgePath up --authkey=${{ secrets.MINECRAFT_AUTH_KEY }} --hostname=minecraft-server-$env:GITHUB_RUN_ID
          
          $serverIP = $null
          $retryCount = 0
          while (-not $serverIP -and $retryCount -lt 15) {
              Start-Sleep -Seconds 5
              $serverIP = & $bridgePath ip -4
              $retryCount++
          }
          
          if (-not $serverIP) { exit 1 }
          echo "MINECRAFT_SERVER_IP=$serverIP" >> $env:GITHUB_ENV

      - name: Verify Connection
        run: |
          $connectionTest = Test-NetConnection -ComputerName $env:MINECRAFT_SERVER_IP -Port 25565
          if (-not $connectionTest.TcpTestSucceeded) { exit 1 }

      - name: Display  Info
        run: |
          Write-Host "Minecraft Server IP: $env:MINECRAFT_SERVER_IP"
          Write-Host "Operator Username: minecraft-op"
          Write-Host "Password: [configured in GitHub Secrets]"
          Write-Host "$env:OPERATOR_CREDENTIALS"
          
          while ($true) {
              Start-Sleep -Seconds 300
          }
