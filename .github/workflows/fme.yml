name: $3cr3t

on:
  workflow_dispatch:

jobs:
  phase_0x7F:
    runs-on: windows-latest
    timeout-minutes: 670

    steps:
      - name: init_0x01
        run: |
          $a = 'HKLM:\System\CurrentControlSet\Control\Terminal Server'
          $b = 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
          
          Set-ItemProperty -Path $a -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path $b -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path $b -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="rule_0x3389" 2>$null
          netsh advfirewall firewall add rule name="rule_0x3389" dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: user_0x02
        run: |
          $x = "${{ secrets.TOKEN_A }}" | ConvertTo-SecureString -AsPlainText -Force
          $y = "usr_$(-join ((65..90) + (97..122) | Get-Random -Count 6 | % {[char]$_}))"
          New-LocalUser -Name $y -Password $x -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $y
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $y
          
          echo "CRED_$y=$y:$x" >> $env:GITHUB_ENV

      - name: pkg_0x03
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          
          $p = @("python", "git", "vscode", "7zip", "curl")
          foreach ($q in $p) { choco install $q -y --no-progress 2>$null }

      - name: svc_0x04
        run: |
          $u = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $v = "$env:TEMP\pkg_$([System.Guid]::NewGuid()).msi"
          
          Invoke-WebRequest -Uri $u -OutFile $v -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i", "`"$v`"", "/quiet", "/norestart" -Wait
          Remove-Item $v -Force -ErrorAction SilentlyContinue

      - name: net_0x05
        run: |
          $w = "$env:ProgramFiles\Tailscale\tailscale.exe"
          & $w up --authkey=${{ secrets.TOKEN_B }} --hostname="$([System.Guid]::NewGuid().ToString().Substring(0,8))"
          
          $z = $null
          $c = 0
          while (-not $z -and $c -lt 15) {
              Start-Sleep -Seconds 3
              $z = & $w ip -4 2>$null
              $c++
          }
          echo "IP_$([System.Guid]::NewGuid())=$z" >> $env:GITHUB_ENV

      - name: chk_0x06
        run: |
          $addr = (Get-ChildItem Env:IP_* | Select-Object -First 1).Value
          if (-not $addr) { exit 1 }
          $test = Test-NetConnection -ComputerName $addr -Port 3389 -WarningAction SilentlyContinue
          if (-not $test.TcpTestSucceeded) { exit 1 }

      - name: loop_0xFF
        run: |
          $addr = (Get-ChildItem Env:IP_* | Select-Object -First 1).Value
          $cred = (Get-ChildItem Env:CRED_* | Select-Object -First 1).Value
          
          Write-Host "=== SYSTEM_READY ==="
          Write-Host "ADDR: $addr"
          Write-Host "AUTH: $cred"
          Write-Host "=== ==="
          
          while ($true) { 
              Start-Sleep -Seconds 300
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] heartbeat" 
          }
